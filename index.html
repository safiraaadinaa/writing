<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Air Writing</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
position:absolute;
width:100%;
height:100%;
transform:scaleX(-1);
}

#text{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:40px;
background:rgba(0,0,0,0.5);
padding:10px 20px;
border-radius:10px;
}

#clear{
position:absolute;
top:20px;
right:20px;
font-size:16px;
padding:10px 15px;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas"></canvas>

<div id="text"></div>
<button id="clear">Clear</button>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
const textBox=document.getElementById("text")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let points=[]
let drawing=false
let smoothX=null
let smoothY=null
let resultText=""

let recognizeTimer=null

document.getElementById("clear").onclick=()=>{
resultText=""
textBox.innerText=""
}

function drawStroke(){

ctx.beginPath()

for(let i=0;i<points.length;i++){

let p=points[i]

if(i==0) ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)

}

ctx.stroke()

}

async function recognize(){

if(points.length<20) return

let temp=document.createElement("canvas")
let tctx=temp.getContext("2d")

temp.width=200
temp.height=200

let minX=Infinity
let minY=Infinity
let maxX=0
let maxY=0

points.forEach(p=>{
minX=Math.min(minX,p.x)
minY=Math.min(minY,p.y)
maxX=Math.max(maxX,p.x)
maxY=Math.max(maxY,p.y)
})

let w=maxX-minX
let h=maxY-minY

tctx.fillStyle="white"
tctx.fillRect(0,0,200,200)

tctx.drawImage(canvas,minX,minY,w,h,20,20,160,160)

let res=await Tesseract.recognize(temp,"eng")

let char=res.data.text.trim()

if(char.length>0){

resultText+=char[0]
textBox.innerText=resultText

}

}

function run(results){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(results.image,0,0,canvas.width,canvas.height)

ctx.strokeStyle="yellow"
ctx.lineWidth=6
ctx.lineCap="round"

drawStroke()

if(results.multiHandLandmarks){

let lm=results.multiHandLandmarks[0]

let index=lm[8]
let thumb=lm[4]

let x=index.x*canvas.width
let y=index.y*canvas.height

if(smoothX==null){

smoothX=x
smoothY=y

}else{

smoothX+=(x-smoothX)*0.4
smoothY+=(y-smoothY)*0.4

}

ctx.beginPath()
ctx.arc(smoothX,smoothY,6,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

let pinch=Math.hypot(index.x-thumb.x,index.y-thumb.y)

if(pinch<0.05){

drawing=true
points.push({x:smoothX,y:smoothY})

}else{

if(drawing){

clearTimeout(recognizeTimer)

recognizeTimer=setTimeout(()=>{
recognize()
points=[]
},500)

}

drawing=false

}

}

}

const hands=new Hands({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
})

hands.setOptions({

maxNumHands:1,
modelComplexity:0,
minDetectionConfidence:0.6,
minTrackingConfidence:0.6

})

hands.onResults(run)

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video})
},
width:480,
height:360
})

camera.start()

video.play()

</script>

</body>
</html>

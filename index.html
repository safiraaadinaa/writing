<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Air Writing</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:#050301;
}

canvas{
position:absolute;
width:100%;
height:100%;
transform:scaleX(-1);
}

#text{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:38px;
background:rgba(0,0,0,0.6);
padding:10px 20px;
border-radius:10px;
font-family:Arial;
}

#hint{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:15px;
background:rgba(0,0,0,0.5);
padding:8px 15px;
border-radius:8px;
}

#clearBtn{
position:absolute;
right:20px;
bottom:20px;
font-size:16px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#F5D061;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas"></canvas>

<div id="hint">
Pinch (ibu jari + telunjuk) untuk menulis
</div>

<div id="text"></div>

<button id="clearBtn">Clear</button>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
const textBox=document.getElementById("text")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let drawing=false
let points=[]
let smoothX=null
let smoothY=null
let resultText=""

document.getElementById("clearBtn").onclick=()=>{
resultText=""
textBox.innerText=""
points=[]
}

function drawStroke(){
ctx.beginPath()
for(let i=0;i<points.length;i++){
let p=points[i]
if(i==0) ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)
}
ctx.stroke()
}

async function recognize(){

if(points.length<25) return

let temp=document.createElement("canvas")
let tctx=temp.getContext("2d")

temp.width=200
temp.height=200

let minX=Infinity
let minY=Infinity
let maxX=0
let maxY=0

points.forEach(p=>{
minX=Math.min(minX,p.x)
minY=Math.min(minY,p.y)
maxX=Math.max(maxX,p.x)
maxY=Math.max(maxY,p.y)
})

let w=maxX-minX
let h=maxY-minY

tctx.fillStyle="white"
tctx.fillRect(0,0,200,200)

tctx.drawImage(canvas,minX,minY,w,h,20,20,160,160)

let res=await Tesseract.recognize(temp,"eng")

let char=res.data.text.trim()

if(char.length>0){

char=char[0]

resultText+=char
textBox.innerText=resultText

}

}

function run(res){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(res.image,0,0,canvas.width,canvas.height)

ctx.strokeStyle="#F5D061"
ctx.lineWidth=6
ctx.lineCap="round"

drawStroke()

if(res.multiHandLandmarks){

let lm=res.multiHandLandmarks[0]

drawConnectors(ctx,lm,HAND_CONNECTIONS,{color:"#888"})
drawLandmarks(ctx,lm,{color:"white"})

let index=lm[8]
let thumb=lm[4]

let x=index.x*canvas.width
let y=index.y*canvas.height

if(smoothX==null){

smoothX=x
smoothY=y

}
else{

smoothX+=(x-smoothX)*0.35
smoothY+=(y-smoothY)*0.35

}

ctx.beginPath()
ctx.arc(smoothX,smoothY,6,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

let pinch=Math.hypot(index.x-thumb.x,index.y-thumb.y)

if(pinch<0.05){

drawing=true
points.push({x:smoothX,y:smoothY})

}
else{

if(drawing){

recognize()

}

drawing=false
points=[]

}

}

}

const hands=new Hands({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
})

hands.setOptions({

maxNumHands:1,
modelComplexity:0,
minDetectionConfidence:0.6,
minTrackingConfidence:0.6

})

hands.onResults(run)

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video})
},
width:480,
height:360
})

camera.start()

video.play()

</script>

</body>
</html>
